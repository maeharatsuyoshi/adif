name: Supabase Keepalive

on:
  schedule:
    - cron: '0 12 * * *'  # Every day at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          # Vary the (PostgREST-valid) offset param per run + no-cache headers
          # so the URL is unique each time and can't be served from an edge
          # cache. The request always reaches Supabase's origin and runs a real
          # query, which is what resets the inactivity / auto-pause timer.
          curl -fsS \
            --retry 5 --retry-all-errors --retry-delay 15 \
            --connect-timeout 15 --max-time 60 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/team_members?select=id&limit=1&offset=${GITHUB_RUN_ID}"
